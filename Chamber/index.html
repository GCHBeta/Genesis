:root {

    rgba(210,235,255,.92);

/* -------------------------------
   RESET

    padding:0;

    height:100%;

/* -------------------------------
   WORLD
-------------------------------- */

    position:relative;

    width:100vw;

    height:100vh;

/* -------------------------------
   ATMOSPHERE
-------------------------------- */


#particles {


    position:absolute;

    inset:0;


    width:100%;

    height:100%;


    opacity:.5;


}




#atmosphere {

    position:absolute;

    inset:0;


    pointer-events:none;


    z-index:15;


    background:


    radial-gradient(

        320px circle at var(--mx,50%) var(--my,50%),

        rgba(180,220,255,.12),

        rgba(120,180,255,.04) 25%,

        transparent 65%

    );


    mix-blend-mode:

    screen;


    transition:

    background .4s ease;


}

/*Cursor*/

html,
body,
#genesis,
.gate {
    cursor:none;
}

#cursor-core {


    position:absolute;


    width:28px;

    height:28px;


    pointer-events:none;


    z-index:1000;


    transform:
    translate(-50%,-50%);


    display:flex;


    align-items:center;


    justify-content:center;


}



#cursor-core span {


    font-family:

    Georgia,
    serif;


    font-size:22px;


    font-weight:400;


    color:

    rgba(245,250,255,.95);


    text-shadow:


    0 0 10px rgba(180,220,255,.9),


    0 0 35px rgba(120,190,255,.8);



    animation:

    betaPulse 3s infinite ease-in-out;


}




#cursor-core::before {


    content:"";


    position:absolute;


    inset:-10px;


    border-radius:50%;


    border:

    1px solid rgba(180,220,255,.45);


    animation:

    cursorOrbit 5s linear infinite;


}




#cursor-core::after {


    content:"";


    position:absolute;


    inset:-24px;


    border-radius:50%;


    background:


    radial-gradient(

        circle,

        rgba(120,190,255,.18),

        transparent 65%

    );


    filter:

    blur(5px);


}




@keyframes betaPulse {


    0%,
    100% {

        opacity:.65;

        transform:scale(.9);

    }


    50% {

        opacity:1;

        transform:scale(1.15);

    }


}



@keyframes cursorOrbit {


    from {

        transform:
        rotate(0deg);

    }


    to {

        transform:
        rotate(360deg);

    }

}

/* -------------------------------
   GENESIS SIGIL
-------------------------------- */


#artifact {


    position:absolute;

    display:flex;

    align-items:center;

    justify-content:center;


    z-index:3;

.beta-core {

    width:220px;

    display:flex;

    align-items:center;

    justify-content:center;

    animation:

    breathe 5s infinite ease-in-out;

}



.beta-core::before {


    content:"";


    position:absolute;


    inset:0;


    border-radius:50%;


    border:

    1px solid rgba(180,220,255,.35);


    box-shadow:


    0 0 60px rgba(120,190,255,.35);


}



.beta-core::after {

/* -------------------------------

-------------------------------- */


#architecture {


    position:absolute;


    inset:0;


    z-index:2;


    opacity:0;


    animation:

    chamberReveal 4s forwards;


    animation-delay:2s;


}



@keyframes chamberReveal {


    to {

        opacity:1;

    }

}



.orbit {


    position:absolute;


    left:50%;

    top:50%;


    transform:

    translate(-50%,-50%);


    border-radius:50%;


    border:

    1px solid var(--line);


}



.orbit.one {


    width:80vw;

    height:80vw;

.orbit.two {

    height:55vw;

/* -------------------------------
   MONUMENT
-------------------------------- */


#monument {

    position:absolute;

    z-index:10;

    left:0;

    right:0;

    text-align:center;

    opacity:0;

    transform:
    translateY(-20px);

    animation:

    monumentReveal 2s forwards;

    animation-delay:3.5s;

}



@keyframes monumentReveal {


    to {

        translateY(0);

}

    translateY(-15px);

#monument p {

    clamp(

    transform:
    translateY(15px);


    animation:

    subtitleReveal 1.8s forwards;


    animation-delay:4.8s;


}



@keyframes subtitleReveal {


    to {

        opacity:1;

        transform:
        translateY(0);

    }

}






/* -------------------------------
   GATES
-------------------------------- */


#gates {


    position:absolute;


    z-index:20;


    left:0;

    right:0;


    bottom:7%;


    display:flex;


    justify-content:center;


    gap:18px;

.gate {

    position:relative;

    width:190px;
    height:260px;


    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;


    text-decoration:none;

    color:white;


    opacity:0;

    transform:translateY(40px);


    background:

    linear-gradient(

        180deg,

        rgba(255,255,255,.08),

        rgba(255,255,255,.015)

    );


    border:

    1px solid rgba(220,240,255,.18);


    clip-path:

    polygon(

        50% 0%,

        100% 12%,

        100% 88%,

        50% 100%,

        0% 88%,

        0% 12%

    );


    animation:

    gateReveal 1.5s forwards;


    animation-delay:7s;


    transition:

    transform .6s ease,

    filter .6s ease;

}




.gate:nth-child(2){

.gate:nth-child(3){

.gate:hover {

    rgba(220,240,255,.5);

@keyframes gateReveal {

.gate span {

    Georgia,

<script>


/* ==========================================
   GENESIS ATMOSPHERE ENGINE
========================================== */


const canvas =
document.getElementById(
"particles"
);


const ctx =
canvas.getContext(
"2d"
);



let w,h;



function resize(){


w =
canvas.width =
window.innerWidth;


h =
canvas.height =
window.innerHeight;


}



resize();


window.addEventListener(
"resize",
resize
);





const stars =
Array.from(
{length:180},
()=>({

x:Math.random()*w,

y:Math.random()*h,

r:Math.random()*1.5+.2,

speed:Math.random()*.25+.05,

alpha:Math.random()*.6+.2


})
);





function render(){


ctx.clearRect(
0,
0,
w,
h
);



stars.forEach(
s=>{


s.y -= s.speed;



if(s.y < -10){

s.y=h+10;

s.x=Math.random()*w;

}



ctx.beginPath();


ctx.fillStyle=
`rgba(220,235,255,${s.alpha})`;


ctx.arc(
s.x,
s.y,
s.r,
0,
Math.PI*2
);


ctx.fill();



});


requestAnimationFrame(
render
);


}



render();





/* ==========================================
   CURSOR RESONANCE
========================================== */


const cursor =
document.getElementById(
"cursor-core"
);


let cursorX=0;
let cursorY=0;

let targetX=0;
let targetY=0;



window.addEventListener(
"mousemove",
e=>{


targetX=e.clientX;

targetY=e.clientY;



document.documentElement.style
.setProperty(
"--mx",
`${targetX}px`
);



document.documentElement.style
.setProperty(
"--my",
`${targetY}px`
);


});




function animateCursor(){


cursorX +=
(targetX-cursorX)*0.12;


cursorY +=
(targetY-cursorY)*0.12;



cursor.style.transform=

`
translate(
${cursorX}px,
${cursorY}px
)
translate(-50%,-50%)
`;



requestAnimationFrame(
animateCursor
);


}


animateCursor();

const trail =
document.getElementById("cursor-trail");


let trailX = 0;
let trailY = 0;


function animateTrail(){

    trailX += (cursorX-trailX)*0.05;
    trailY += (cursorY-trailY)*0.05;


    trail.style.transform =
    `
    translate(
        ${trailX}px,
        ${trailY}px
    )
    translate(-50%,-50%)
    `;


    requestAnimationFrame(
        animateTrail
    );

}


animateTrail();



</script>
